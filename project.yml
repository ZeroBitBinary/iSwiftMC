# XcodeGen spec. Run `xcodegen generate` on macOS/CI to produce iSwiftMC.xcodeproj.
# Authored on Windows; never built there.
name: iSwiftMC
options:
  bundleIdPrefix: com.swiftmc
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    ENABLE_BITCODE: NO
    CLANG_ENABLE_OBJC_ARC: YES
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    # No-JIT build: we never request the dynamic-codesigning entitlement.
    CODE_SIGN_STYLE: Manual

targets:
  iSwiftMC:
    type: application
    platform: iOS
    sources:
      - src
      # Bundle the whole fetched runtime (JRE + bootstrap jar) verbatim into the
      # app as a folder reference -> iSwiftMC.app/runtimes/... A folder reference
      # (not a group) copies the entire tree, which is what we need for the JRE.
      - path: runtimes
        type: folder
        buildPhase: resources
        optional: true
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftmc.iswiftmc
        # JNI headers are vendored in src/include (a JRE ships no headers, only
        # a JDK does), so <jni.h> resolves at compile time.
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/src/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/runtimes/jre/lib
          - $(SRCROOT)/runtimes/jre/lib/server
    dependencies:
      - sdk: UIKit.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
      # libjvm and the GL stack are dlopen'd at runtime from the bundled runtime
      # (folder reference above), so they are not linked here.
